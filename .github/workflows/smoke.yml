name: Smoke

on:
  pull_request:
    paths:
      - "Conveyo.sln"
      - "examples/**"
      - "scripts/smoke_test.py"
      - "src/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  smoke:
    name: End-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COMPOSE_FILE: .github/docker-compose.smoke.yml
      COMPOSE_PROJECT_NAME: conveyo-smoke
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Conveyo.sln

      - name: Start smoke dependencies
        run: docker compose up -d --wait --quiet-pull

      - name: Run smoke tests
        run: python3 scripts/smoke_test.py --fail-fast --log-dir scripts/_smoke_logs

      - name: Collect smoke logs
        if: always()
        run: |
          mkdir -p scripts/_smoke_logs
          docker compose ps > scripts/_smoke_logs/docker-compose-ps.txt
          docker compose logs --no-color > scripts/_smoke_logs/docker-compose.log

      - name: Stop smoke dependencies
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: scripts/_smoke_logs
